  <script>
    const calledDisplay = document.getElementById("calledNumber");
    const calledList = document.getElementById("calledNumbersList");
    const resumeBtn = document.getElementById("resumeBtn");

    let allNumbers = [];
    let remainingNumbers = [];

    function getPrefix(n) {
      if (n <= 15) return "B";
      if (n <= 30) return "I";
      if (n <= 45) return "N";
      if (n <= 60) return "G";
      return "O";
    }

    
    function callNextNumber() {
      if (remainingNumbers.length === 0) return;
      const idx = Math.floor(Math.random() * remainingNumbers.length);
      const num = remainingNumbers.splice(idx, 1)[0];
      const prefix = getPrefix(num);
      const label = `${prefix}-${num}`;
      allNumbers.push({ label, num });
      calledDisplay.textContent = label;

      // Clear and re-render sorted list
      calledList.innerHTML = "";
      allNumbers.sort((a, b) => a.num - b.num);
      allNumbers.forEach(entry => {
        const tag = document.createElement("span");
        tag.textContent = entry.label;
        calledList.appendChild(tag);
      });
    }

    function resetGame() {
      remainingNumbers = Array.from({length: 75}, (_, i) => i + 1);
      allNumbers = [];
      calledDisplay.textContent = "--";
      calledList.innerHTML = "";

      const backgrounds = ["bg1.jpg", "bg2.jpg", "bg3.jpg", "bg4.jpg", "bg5.jpg", "bg6.jpg", "bg7.jpg", "bg8.jpg", "bg9.jpg", "bg10.jpg", "bg11.jpg", "bg12.jpg", "bg13.jpg", "bg14.jpg"];
      const selected = backgrounds[Math.floor(Math.random() * backgrounds.length)];
      document.body.style.backgroundImage = `url('${selected}')`;
    }

    function startIntermission() {
      resumeBtn.style.display = "inline-block";
      alert("Intermission mode not implemented yet.");
    }

    function resumeGame() {
      resumeBtn.style.display = "none";
    }

    
// On page load
window.onload = function() {
  document.getElementById("callerName").textContent = localStorage.getItem("callerName") || "Caller Name";
  resetGame();
};

  
  const venueLogoData = localStorage.getItem("venueLogo");
  if (venueLogoData) {
    document.getElementById("venueLogo").src = venueLogoData;
  }

</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const elem = document.documentElement;
  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  } else if (elem.msRequestFullscreen) {
    elem.msRequestFullscreen();
  }
});

<script>
let fullscreenTriggered = false;
document.addEventListener("DOMContentLoaded", () => {
  const callButton = document.querySelector("button");
  if (callButton) {
    callButton.addEventListener("click", () => {
      if (!fullscreenTriggered) {
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
          elem.msRequestFullscreen();
        }
        fullscreenTriggered = true;
      }
    });
  }
});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const callNextBtn = document.querySelector('button');
  if (callNextBtn) {
    const originalClick = callNextBtn.onclick;
    callNextBtn.onclick = function(e) {
      const elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
      if (originalClick) originalClick.call(this, e);
    };
  }
});
</script>

<!-- Intermission Slideshow -->
<div id="intermissionContainer" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: black; z-index: 1000; pointer-events: none; text-align: center; color: white;">
  <img id="intermissionImage" src="" style="max-width: 100%; max-height: 80vh; margin-top: 50px;" />
  <div id="intermissionCaption" style="margin-top: 20px; font-size: 1.5em;"></div>
  <button onclick="endIntermission()" style="margin-top: 30px; padding: 12px 24px; font-size: 1.2em;">Resume Play</button>
<style>#intermissionContainer button { pointer-events: auto; }</style>
</div>

<script>
let intermissionSlides = [];
let intermissionIndex = 0;
let intermissionInterval;

function startIntermission() {
  const container = document.getElementById("intermissionContainer");
  const img = document.getElementById("intermissionImage");
  const caption = document.getElementById("intermissionCaption");

  intermissionSlides = [];

  // Load uploaded images and captions
  for (let i = 0; i < 8; i++) {
    const image = localStorage.getItem(`slideImage${i}`);
    const text = localStorage.getItem(`slideCaption${i}`);
    if (image) {
      intermissionSlides.push({ src: image, caption: text || "" });
    }
  }

  // Add Queerazon QR/logo slide
  intermissionSlides.push({
    src: 'data:image/png;base64,UGxhY2Vob2xkZXIgZm9yIHF1ZWVyYXpvbi1sb2dvLnBuZw==',
    caption: "Visit Queerazon.com!"
  });

  if (intermissionSlides.length === 0) return;

  intermissionIndex = 0;
  showIntermissionSlide();

  container.style.display = "block";
  intermissionInterval = setInterval(() => {
    intermissionIndex = (intermissionIndex + 1) % intermissionSlides.length;
    showIntermissionSlide();
  }, 10000);
}

function showIntermissionSlide() {
  const slide = intermissionSlides[intermissionIndex];
  const img = document.getElementById("intermissionImage");
  const caption = document.getElementById("intermissionCaption");
  img.src = slide.src;
  caption.textContent = slide.caption;
}

function endIntermission() {
  clearInterval(intermissionInterval);
  document.getElementById("intermissionContainer").style.display = "none";
}
</script>

<div id="intermissionContainer" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; text-align: center; overflow: hidden;">
  <img id="intermissionImage" src="" style="max-height: 90vh; max-width: 90vw; margin-top: 5vh;"/>
  <div id="intermissionCaption" style="color: white; font-size: 24px; margin-top: 10px;"></div>
</div>

<script>
let intermissionImages = JSON.parse(localStorage.getItem("intermissionImages") || "[]");
let currentSlide = 0;
let slideshowInterval = null;

function startIntermission() {
  if (intermissionImages.length === 0) {
    alert("No images available for slideshow.");
    return;
  }

  document.getElementById("intermissionContainer").style.display = "block";
  document.getElementById("resumeBtn").style.display = "inline-block";

  showSlide(currentSlide);
  slideshowInterval = setInterval(() => {
    currentSlide = (currentSlide + 1) % intermissionImages.length;
    showSlide(currentSlide);
  }, 10000);
}

function showSlide(index) {
  const image = intermissionImages[index];
  document.getElementById("intermissionImage").src = image.url;
  document.getElementById("intermissionCaption").textContent = image.caption || "";
}

function resumeGame() {
  clearInterval(slideshowInterval);
  document.getElementById("intermissionContainer").style.display = "none";
  document.getElementById("resumeBtn").style.display = "none";
}
</script>
